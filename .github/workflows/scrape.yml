name: Scrape and publish

on:
  schedule:
    # Run every day at 07:00 UTC
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      site:
        description: "Site slug to scrape (leave blank for all)"
        required: false
      dry_run:
        description: "Dry run (no commits)"
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "scrape-and-publish"
  cancel-in-progress: false

jobs:
  scrape:
    name: Scrape articles
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('scraper/scrape.py') }}

      - name: Install Playwright browsers
        run: |
          uv run playwright install --with-deps chromium

      - name: Run scraper
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.site }}" ]; then
            ARGS="--site ${{ github.event.inputs.site }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          uv run scraper/scrape.py $ARGS

      - name: Commit new content
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/
          if git diff --cached --quiet; then
            echo "No new articles."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            COUNT=$(git diff --cached --name-only | wc -l)
            git commit -m "scrape: add ${COUNT} article(s) [$(date -u +%Y-%m-%d)]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  build-and-deploy:
    name: Build site and deploy
    needs: scrape
    # Always build on manual dispatch; on schedule only if there's new content
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.scrape.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Pull the commit the scrape job just pushed
          ref: ${{ github.ref }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install Node dependencies
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/_site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
